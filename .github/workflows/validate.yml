name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Brand icons are bundled in custom_components/atomberg_local/brand/;
          # HA 2026.3+ serves them via the local brands-proxy API. The
          # home-assistant/brands repo no longer accepts custom-integration icons,
          # so HACS's (repo-based) brands check is skipped.
          ignore: brands
